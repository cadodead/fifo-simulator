<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FIFO Virtual Memory Simulator</title>
  </head>
  <body>
    <h1>FIFO Simulator</h1>
    <!-- Where the user types FACE, DARE, etc. -->
    <input type="text" id="referenceInput" placeholder="e.g. FACE" maxlength="4" />
    <!-- Kicks off the simulation -->
    <button id="runBtn">Run</button>
    <!-- Where your results will eventually appear -->
    <div id="output"></div>
    <!-- Always at the bottom of body, not in <head> -->
    <script src="fifoVm.js"></script>

  </body>
</html>
